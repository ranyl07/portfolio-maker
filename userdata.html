<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portfolio maker</title>
    <link rel="stylesheet" href="userdata.css">
</head>
<body>
    <div class="Q">
    
             <h1>Create your own</h1>
             <p>Answer the question to fill your porftolio</p>
             <div class="form">
                    <form>
                       <fieldset> 
                        <legend>Personal Informations</legend>
                         <label for="name">Name</label><br>
                         <input type="text" placeholder="Enter your name" id="name" required> <br>
                         <label for="email">Email</label><br>
                         <input type="email"  id="email" required> <br>
                         <label for="phone">Phone Number</label><br>
                         <input type="number" id="phone"><br>
                         <label for="linkedin"> LinkedIn<br>
                            <input type="url" placeholder="optional">
                         </label>
                      </fieldset>
                      </form>
                      </div>

             <div class="About">
                 <fieldset>
                    <legend> About you </legend>
                 <label >
                    derscribe yourself in few lines <br>
                </label>
                <input type="text" id="discribe" name="message" rows="2" cols="25"  width="200" >
                <br> 
                <label>Tagline</label> <br>
                <input type="text" id="tagline" width="30" placeholder="express in one sentence"> <br>
                <label for="pic"> Upload your pic/avatar</label><br>
                <input type="file" id="pic" accept="image/*">
                </fieldset>
             </div>
             <div class="quest">
             <fieldset>
                <legend>Skills</legend>
                <label > do you have any skills?</label><br>
                <button id="yes" class="btn"> yes </button>
                <button class="btn"> No </button>
             </fieldset>
             </div>
             <div class="skill-categ">
                <fieldset>
                    <legend>Your skills</legend>
                  <input type="text" placeholder="">
                  <button class="btn">add</button>
                </fieldset>
            </div>
            <div class="quest">
                 <fieldset> 
                    <legend>Projects</legend>
                    <label>Do you have any projects?</label><br>
                      <button id="true" class="btn"> yes </button>
                      <button class="btn"> No </button>
                </fieldset>
            </div>

            <div class="projects-categ">
                <form>
                <fieldset>
                    <legend> Your Projects</legend>
                    <label>the title of your project</label><br>
                 <input type="text" placeholder="Title"><br>
                  <label for="Link">Enter your project link</label><br>
                  <input type="url" id="Link" placeholder="https://makefolio.com">
                  <button class="btn">add</button>
             </form>
            </fieldset>
            </div>
             <div class="quest">
                <fieldset>
                    <legend>Contact</legend>
                    <label>Do you have any Social media accounts?</label><br>
                      <button id="true" class="btn"> yes </button>
                      <button class="btn"> No </button>
                </fieldset>
            </div>
             <div class="socialm">
                <form>
                <fieldset>
                    <legend> Your Contact</legend>
                    <label>Enter your social links </label><br>
                 <input type="url" placeholder="https://instgram.com/username">
                  <button class="btn">add</button>

             </form>
             </fieldset>
             </div>

             </div>
             </div>
        
    </div>
</body>
</html>

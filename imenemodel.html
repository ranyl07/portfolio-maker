<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Clean</title>

<link rel="stylesheet" href="imenemodel.css">
</head>

<body>

<nav>
  <div class="logo">My Portfolio</div>

  
  <button onclick="chooseTemplate(5)">Use this model</button>

  <ul>
    <li onclick="scrollToSec('about')">About</li>
    <li onclick="scrollToSec('skills')">Skills</li>
    <li onclick="scrollToSec('projects')">Projects</li>
    <li onclick="scrollToSec('experience')">Experience</li>
    <li onclick="scrollToSec('contact')">Contact</li>
  </ul>
</nav>

<div class="left">

  <div class="avatar-box" id="pic">
    📷 Your Photo Here
  </div>

  <h1>Hi, I'm <span id="name">Your Name</span></h1>

  <p id="tagline">Your description here...</p>

<div class="right">

  <div class="section">
    <h2>🟣 ABOUT</h2>
    <div class="card" id="about">Write about yourself...</div>
  </div>

  <div class="section" >
    <h2>🟣 SKILLS</h2>
    <div class="skills" id="skills"></div>
  </div>

  <div class="section" id="projects">
    <h2>🟣 PROJECTS</h2>
    <div class="projects" id="projectsBox"></div>
  </div>

  <div class="section">
    <h2>🟣 EXPERIENCE</h2>
    <div id="experience"></div>
  </div>

  <div class="section">
    <h2>🟣 CONTACT</h2>
    <div id="contact"></div>
  </div>

</div>


<script src="imenemodel.js"></script>

</body>
</html>

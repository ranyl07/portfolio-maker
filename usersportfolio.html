<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Portfolio</title>
<link rel="stylesheet" href="user'sportfolio.css">
</head>

<body>

<div class="container">

  
  <div id="empty" class="card hidden">
    <h1>No Portfolio Yet 😕</h1>
    <p>Create a portfolio to express yourself</p>
    <a href="templates.html" class="btn">Create Portfolio</a>
  </div>


  <div id="portfolio" class="card hidden">

    <div class="header">
      <h1 id="name"></h1>
      <p id="tagline"></p>
    </div>

    <div class="section">
      <h2>About Me</h2>
      <p id="about"></p>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <div id="skills"></div>
    </div>

    <div class="section">
      <h2>Contact</h2>
      <p id="email"></p>
      <p id="phone"></p>
    </div>

    <div class="actions">
      <button id="edit">Edit</button>
      <button id="delete">Delete</button>
    </div>

  </div>

</div>

<script src="user'sportfolio.js"></script>

</body>
</html>
